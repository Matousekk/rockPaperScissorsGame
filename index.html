<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,paper,scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock, paper, scissors game</h1>
            <div class="rightSide">
                <div class="weapon">Computer weapon:</div>
                <div id="computerOutput"></div>
            </div>
    </div>
    <div class="userPart">
        <div class="choice">Which hand will you play?</div>
        <div class="images">
            <img data-choice='rock' src="img/fist.png">
            <img data-choice='paper' src="img/hand-paper.png">
            <img data-choice='scissors' src="img/scissors.png">
        </div>
    </div>
            <div class="bottomUserPart">
                <div>Total Rounds:</div>
                <button id="userButtonTwo">Another round?</button>
                <div>Your score:</div>
            </div>
            <div class="bottomUserResults">
                <div id="totalRounds">...</div>
                <div id="yourScore">...</div>
            </div>
    <script src="game.js"></script>
</body>
</html>
