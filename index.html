<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,paper,scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock, paper, scissors game</h1>
            <div class="rightSide">
                <div id="computerOutput"></div>
            </div>
    </div>
    <div class="userPart">
        <div class="choice">Which hand will you play?</div>
        <div class="images">
            <img data-choice='rock' class='rockButton' src="img/fist.png">
            <img data-choice='paper' class='paperButton' src="img/hand-paper.png">
            <img data-choice='scissors' class='scissorsButton' src="img/scissors.png">
        </div>
    </div>
            <div class="bottomUserPart">
                <div class="roundNumberText">Round number:</div>
                <button id="userButtonTwo">Another match?</button>
                <div class="scoreNumberText">Total score:</div>
            </div>
            <div class="bottomUserResults">
                <div id="rounds"></div>
                <div id="roundText"></div>
                <div id="score"></div>
            </div>
    <script src="game.js"></script>
</body>
</html>
